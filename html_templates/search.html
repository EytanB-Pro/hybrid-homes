<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Results | Hybrid Homes</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800&family=Playfair+Display:ital,wght=0,600;0,700;1,400&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Playfair Display', 'serif'],
          },
          colors: {
            emerald: {
              50: '#f0fdf4',
              100: '#dcfce7',
              500: '#10b981',
              800: '#065f46',
              900: '#0f5132', // Classic Brand Emerald
            },
            basalt: {
              50: '#f8fafc',
              100: '#f1f5f9',
              800: '#1e293b',
              900: '#0f172a',
              950: '#0b0f19', // Deep Ink
            },
            sage: {
              50: '#f4f7f5',
              100: '#eef5f1',
              200: '#dce8e1',
              300: '#c2d5cb'
            }
          },
          borderRadius: {
            'organic': '24px',
          },
          boxShadow: {
            'atmosphere': '0 20px 40px -10px rgba(11, 15, 25, 0.06), 0 8px 20px -6px rgba(11, 15, 25, 0.03)',
            'atmosphere-dark': '0 20px 40px -10px rgba(0, 0, 0, 0.5), 0 8px 20px -6px rgba(0, 0, 0, 0.3)',
          }
        }
      }
    }
  </script>

  <style>
    body {
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.4s cubic-bezier(0.16, 1, 0.3, 1), color 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
  </style>
</head>
<body class="bg-sage-50 text-basalt-950 dark:bg-basalt-950 dark:text-basalt-100 min-h-screen flex flex-col font-sans transition-colors duration-500">

  <header class="sticky top-0 w-full z-40 bg-sage-50/80 dark:bg-basalt-950/80 backdrop-blur-xl border-b border-basalt-900/5 dark:border-white/5 transition-colors duration-500">
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2.5 group">
        <span class="w-10 h-10 rounded-full bg-emerald-900 dark:bg-emerald-500 flex items-center justify-center text-white transition-all duration-300 group-hover:scale-105 group-hover:rotate-12 shadow-md">
          <i data-lucide="layers" class="w-5 h-5"></i>
        </span>
        <div class="flex flex-col">
          <span class="font-bold text-lg tracking-tight text-basalt-950 dark:text-white flex items-center gap-1">
            Hybrid Homes
          </span>
          <span class="text-[11px] text-slate-500 dark:text-slate-400 font-medium uppercase tracking-widest">Architectural Canvas</span>
        </div>
      </a>

      <ul class="flex items-center gap-6 list-none">
        <li>
          <a href="/" class="hidden md:inline-block text-xs font-bold uppercase tracking-wider text-emerald-900 dark:text-emerald-400 transition-colors">
            Explore Architecture
          </a>
        </li>
        <li>
          <a href="/create_post" class="px-4 py-2 bg-basalt-950 dark:bg-white text-white dark:text-basalt-950 rounded-full text-xs font-semibold uppercase tracking-wider hover:bg-emerald-900 dark:hover:bg-emerald-500 dark:hover:text-basalt-950 transition-all shadow-sm" id="sellerCtaLink" onclick="handleSellerRedirect(event)">
            Become a Seller
          </a>
        </li>
        
        <li>
          <button onclick="toggleDarkMode()" class="p-2.5 rounded-full border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-900 transition-all" title="Toggle System Theme">
            <i id="theme-icon" data-lucide="sun" class="w-4 h-4"></i>
          </button>
        </li>

        <li class="relative">
          <button class="w-10 h-10 rounded-full bg-white dark:bg-basalt-900 border border-slate-200 dark:border-basalt-800 flex items-center justify-center text-slate-600 dark:text-slate-300 shadow-sm transition-transform hover:scale-105" id="profileButton" onclick="handleProfileClick(event)">
            <i data-lucide="user" class="w-4 h-4"></i>
          </button>
          <div class="hidden absolute right-0 top-14 bg-white dark:bg-basalt-900 rounded-2xl p-5 shadow-atmosphere dark:shadow-atmosphere-dark min-w-[240px] z-50 border border-slate-100 dark:border-basalt-850" id="profileDropdown">
            <p class="font-bold text-xs text-basalt-950 dark:text-white" id="dropdownFullName">Loading Identity...</p>
            <p class="text-[11px] text-slate-400 dark:text-slate-500 mb-3" id="dropdownUsername">@username</p>
            <hr class="border-slate-100 dark:border-basalt-800 mb-3">
            <a href="/logout" class="text-xs font-bold text-red-600 hover:text-red-500 uppercase tracking-wider" onclick="executeLogout(event)">Sign Out</a>
          </div>
        </li>
      </ul>
    </div>
  </header>

  <main class="flex-grow w-full max-w-7xl mx-auto px-6 py-12">
    <div class="mb-10">
      <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-basalt-950 dark:text-white font-display mb-2">
        Search Results
      </h1>
      <p id="searchMetaSummary" class="text-sm text-slate-500 dark:text-slate-400 font-light">
        Processing data request...
      </p>
    </div>

    <div id="statusContainer" class="flex flex-col items-center justify-center text-center py-24 text-slate-500 dark:text-slate-400 text-base font-light">
      <div class="w-10 h-10 border-4 border-slate-200 dark:border-basalt-800 border-t-emerald-600 dark:border-t-emerald-400 rounded-full animate-spin mb-4"></div>
      Loading sustainable footprints...
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="searchResultsGrid" style="display: none;"></div>
  </main>

  <footer class="w-full border-t border-slate-100 dark:border-basalt-900 py-10 px-6 text-center text-xs text-slate-400 dark:text-slate-500">
    <p>&copy; 2026 Hybrid Homes Architectural Systems. Clean Design Blueprint.</p>
  </footer>

  <script>
    lucide.createIcons();

    let identityCache = { logged_in: false };

    document.addEventListener("DOMContentLoaded", () => {
      // Identity core verification framework mapping
      fetch('/api/auth-status')
        .then(res => res.json())
        .then(data => {
          identityCache = data;
          if (data.logged_in) {
            const profBtn = document.getElementById('profileButton');
            const fullNm = document.getElementById('dropdownFullName');
            const usrNm = document.getElementById('dropdownUsername');
            
            if(profBtn) profBtn.classList.add('border-emerald-500');
            if(fullNm) fullNm.textContent = `${data.first_name} ${data.last_name}`;
            if(usrNm) usrNm.textContent = `@${data.username}`;
          }
        })
        .catch(err => console.error("Identity core network offline:", err));

      // Global window monitoring framework for dropdown toggles
      window.addEventListener('click', (e) => {
        const dropdown = document.getElementById('profileDropdown');
        const profileBtn = document.getElementById('profileButton');
        if (dropdown && profileBtn && !profileBtn.contains(e.target) && !dropdown.contains(e.target)) {
          dropdown.classList.add('hidden');
        }
      });
    });

    // Theme Engine Management Framework
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
      updateThemeIcon(true);
    } else {
      document.documentElement.classList.remove('dark');
      updateThemeIcon(false);
    }

    function toggleDarkMode() {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      updateThemeIcon(isDark);
    }

    function updateThemeIcon(isDark) {
      const icon = document.getElementById('theme-icon');
      if (icon) {
        icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
        lucide.createIcons();
      }
    }

    function handleProfileClick(event) {
      event.preventDefault(); event.stopPropagation();
      if (identityCache.logged_in) {
        const dropdown = document.getElementById('profileDropdown');
        if(dropdown) dropdown.classList.toggle('hidden');
      } else {
        window.location.href = '/signup?next=' + encodeURIComponent(window.location.pathname);
      }
    }

    function handleSellerRedirect(event) {
      event.preventDefault();
      window.location.href = identityCache.logged_in ? '/create_post' : '/signup?next=' + encodeURIComponent('/create_post');
    }

    function executeLogout(event) {
      event.preventDefault();
      fetch('/logout', { method: 'GET' }).then(() => { window.location.href = '/'; });
    }

    // Dynamic Search Result Layout Injection Architecture Framework
    document.addEventListener("DOMContentLoaded", function() {
      const urlParams = new URLSearchParams(window.location.search);
      const query = urlParams.get('q');

      const metaSummary = document.getElementById('searchMetaSummary');
      const statusContainer = document.getElementById('statusContainer');
      const resultsGrid = document.getElementById('searchResultsGrid');

      if (!query) {
        statusContainer.innerHTML = `<div class="p-6 text-sm font-medium bg-slate-100 dark:bg-basalt-900 rounded-xl max-w-md">No keywords provided. Try searching from the home screen.</div>`;
        metaSummary.textContent = "Empty search criteria.";
        return;
      }

      metaSummary.innerHTML = `Showing matches for: <span class="text-emerald-600 dark:text-emerald-400 font-semibold italic">"${escapeHtml(query)}"</span>`;

      fetch(`/multi_search/${encodeURIComponent(query)}`)
        .then(response => {
          if (!response.ok) throw new Error("Network response error.");
          return response.json();
        })
        .then(data => {
          const hits = data.hits || [];
          
          if (hits.length === 0) {
            statusContainer.innerHTML = `<div class="p-6 text-sm font-medium bg-slate-100 dark:bg-basalt-900 rounded-xl max-w-md">No properties matched your structural keywords.</div>`;
            return;
          }

          statusContainer.style.display = 'none';
          resultsGrid.style.display = 'grid';
          resultsGrid.innerHTML = '';

          hits.forEach(property => {
            const imgSrc = (property.images && property.images.length > 0) 
              ? `/static/uploads/${property.images[0]}` 
              : 'https://images.dwell.com/photos-6063391372700811264/6133436310494187520-large/prefab-stockholm-studio.jpg';

            const safeAddressParam = encodeURIComponent(property.address_line1.trim());
            const targetPostId = property.post_id || property.id; 
            const detailsUrl = `/home/${safeAddressParam}/${targetPostId}`;
            const authorInitial = property.username ? property.username.charAt(0).toUpperCase() : 'H';

            const cardHTML = `
              <a href="${detailsUrl}" class="flex group">
                <div class="w-full bg-white dark:bg-basalt-900 border border-slate-200/60 dark:border-basalt-800/80 rounded-[24px] overflow-hidden shadow-atmosphere dark:shadow-atmosphere-dark flex flex-col transition-all duration-300 hover:-translate-y-1 hover:shadow-lg">
                  <div class="w-full h-52 overflow-hidden bg-sage-100 dark:bg-basalt-950 relative">
                    <img src="${imgSrc}" alt="${escapeHtml(property.property_type)}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                  </div>
                  <div class="p-6 flex-grow flex flex-col justify-between">
                    <div>
                      <div class="flex items-center gap-2 mb-4">
                        <div class="w-6 h-6 bg-sage-100 dark:bg-basalt-950 text-emerald-900 dark:text-emerald-400 rounded-full flex items-center justify-center text-[10px] font-extrabold border border-slate-200/30">
                          ${authorInitial}
                        </div>
                        <span class="text-xs font-semibold text-slate-500 dark:text-slate-400">
                          @${escapeHtml(property.username || 'anonymous')}
                        </span>
                      </div>

                      <div class="flex justify-between items-center mb-3">
                        <span class="bg-emerald-50 dark:bg-emerald-900/20 text-emerald-900 dark:text-emerald-400 text-[10px] font-extrabold uppercase tracking-widest px-2.5 py-0.5 rounded-full border border-emerald-500/10">
                          ${escapeHtml(property.listing_type || 'Active')}
                        </span>
                        <span class="text-base font-bold text-emerald-600 dark:text-emerald-400 font-display">
                          $${Number(property.price).toLocaleString()}
                        </span>
                      </div>
                      
                      <h3 class="text-lg font-bold text-basalt-950 dark:text-white tracking-tight mb-0.5 font-display truncate">
                        ${escapeHtml(property.address_line1)}
                      </h3>
                      <p class="text-xs text-slate-400 dark:text-slate-500 mb-4 font-light truncate">
                        ${escapeHtml(property.city)}, ${escapeHtml(property.state)} ${escapeHtml(property.zip_code)}
                      </p>

                      <div class="flex gap-4 text-xs text-slate-400 dark:text-slate-500 mb-4 border-b border-slate-100 dark:border-basalt-850 pb-3 font-medium">
                        <span class="flex items-center gap-1"><i data-lucide="bed" class="w-3.5 h-3.5 shrink-0"></i> <strong>${property.num_bedrooms}</strong> beds</span>
                        <span class="flex items-center gap-1"><i data-lucide="bath" class="w-3.5 h-3.5 shrink-0"></i> <strong>${property.num_bathrooms}</strong> baths</span>
                        <span class="flex items-center gap-1"><i data-lucide="maximize" class="w-3.5 h-3.5 shrink-0"></i> <strong>${property.square_footage}</strong> sqft</span>
                      </div>
                    </div>
                    
                    <p class="text-xs text-slate-500 dark:text-slate-400 line-clamp-2 font-light leading-relaxed">
                      ${escapeHtml(property.description || '')}
                    </p>
                  </div>
                </div>
              </a>
            `;
            resultsGrid.insertAdjacentHTML('beforeend', cardHTML);
          });
          
          // Refresh newly attached lucide SVG icons
          lucide.createIcons();
        })
        .catch(err => {
          console.error(err);
          statusContainer.innerHTML = `<div class="p-4 text-xs font-semibold bg-red-50 text-red-700 dark:bg-red-900/20 dark:text-red-400 rounded-xl">An error occurred while communicating with the backend search cluster.</div>`;
        });
    });

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
