<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Homes - Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    
    <style>
        /* Centering the registration card perfectly on the screen */
        .auth-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 160px);
            padding: 2rem 1rem;
        }
        .auth-card {
            width: 100%;
            max-width: 500px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">
            🌱 <span>HYBRID-HOMES</span>
        </div>
        <ul class="nav-links">
            <li><a href="#" class="nav-link active">Sign Up</a></li>
        </ul>
    </header>

    <div class="container auth-wrapper">
        <div class="card auth-card">
            <h2 class="card-title">Create Account</h2>
            <p>Please fill out the form below to register your account.</p>

            <div id="errorAlert" class="alert alert-danger hidden"></div>
            <div id="successAlert" class="alert hidden"></div>

            <form id="signupForm" action="/signup" method="POST">
                
                <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 0;">
                    <div class="form-group">
                        <label class="form-label" for="first_name">First Name</label>
                        <input type="text" id="first_name" name="first_name" class="form-control" placeholder="John" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="last_name">Last Name</label>
                        <input type="text" id="last_name" name="last_name" class="form-control" placeholder="Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="johndoe123" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="dob">Date of Birth (optional)</label>
                    <input type="date" id="dob" name="dob" class="form-control">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    Register Account
                </button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Hybrid Homes Project. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const errorAlert = document.getElementById('errorAlert');
            const successAlert = document.getElementById('successAlert');
            const form = e.target;

            // Clear previous alerts
            errorAlert.classList.add('hidden');
            errorAlert.innerText = '';
            successAlert.classList.add('hidden');
            successAlert.innerText = '';

            // Construct payload dynamically from inputs
            const formData = new FormData(form);
            const data = {};
            formData.forEach((value, key) => {
                data[key] = value;
            });

            try {
                // Post to your active Flask endpoint using JSON parsing format
                const response = await fetch('/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'An unexpected error occurred.');
                }

                // Success visual change
                successAlert.innerText = `${result.message}! (User ID: ${result.user_id})`;
                successAlert.classList.remove('hidden');
                successAlert.classList.add('alert-success');
                form.reset(); // Clear form fields

            } catch (err) {
                // Populate error banner
                errorAlert.innerText = err.message;
                errorAlert.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
