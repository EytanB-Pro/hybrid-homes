<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Homes - Sign In</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    
    <style>
        /* Centering the registration/login card perfectly on the screen */
        .auth-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 160px);
            padding: 2rem 1rem;
        }
        .auth-card {
            width: 100%;
            max-width: 500px;
        }
        .hidden {
            display: none;
        }
        .auth-footer-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">
            🌱 <span>HYBRID-HOMES</span>
        </div>
        <ul class="nav-links">
            <li><a href="/signup" class="nav-link">Sign Up</a></li>
            <li><a href="/signin" class="nav-link active">Sign In</a></li>
        </ul>
    </header>

    <div class="container auth-wrapper">
        <div class="card auth-card">
            <h2 class="card-title">Welcome Back</h2>
            <p>Please enter your credentials to access your account.</p>

            <div id="errorAlert" class="alert alert-danger hidden"></div>
            <div id="successAlert" class="alert hidden"></div>

            <form id="signinForm" action="/signin" method="POST">
                
                <div class="form-group">
                    <label class="form-label" for="username_or_email">Username or Email Address</label>
                    <input type="text" id="username_or_email" name="username_or_email" class="form-control" placeholder="johndoe123 or john@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    Sign In
                </button>

                <div class="auth-footer-link">
                    Don't have an account? <a href="/signup">Create one here</a>.
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Hybrid Homes Project. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('signinForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const errorAlert = document.getElementById('errorAlert');
            const successAlert = document.getElementById('successAlert');
            const form = e.target;

            // Clear previous alerts
            errorAlert.classList.add('hidden');
            errorAlert.innerText = '';
            successAlert.classList.add('hidden');
            successAlert.innerText = '';

            // Construct payload dynamically from inputs
            const formData = new FormData(form);
            const data = {};
            formData.forEach((value, key) => {
                data[key] = value;
            });

            try {
                // Post to your active Flask endpoint using JSON parsing format
                const response = await fetch('/signin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'An unexpected error occurred.');
                }

                // Success response state handling
                successAlert.innerText = `${result.message}! Redirecting...`;
                successAlert.classList.remove('hidden');
                successAlert.classList.add('alert-success');
                
                form.reset(); // Clear form fields

                // Optional: Redirect user to homepage or user profile after 1.5 seconds
                setTimeout(() => {
                    window.location.href = `/get_user/${result.user.username}`;
                }, 1500);

            } catch (err) {
                // Populate error banner
                errorAlert.innerText = err.message;
                errorAlert.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
